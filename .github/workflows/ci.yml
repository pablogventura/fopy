name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,draw]"
      - name: Ruff
        run: ruff check src tests
      - name: Pytest core
        run: pytest tests/ -m "not slow and not finite" --cov=fopy --cov-report=term-missing --cov-fail-under=85
      - name: Pytest finite
        run: pytest tests/ -m "finite" --cov=fopy.finite --cov-report=term-missing --cov-fail-under=70
